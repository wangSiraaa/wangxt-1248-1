version: '3.8'

services:
  postgis:
    image: postgis/postgis:15-3.4
    container_name: uav-postgis
    environment:
      POSTGRES_DB: uav_approval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/postgis/init-postgis.sh:/docker-entrypoint-initdb.d/init-postgis.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uav-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uav-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgis
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
      DB_DATABASE: uav_approval
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      JWT_SECRET: uav-approval-jwt-secret-key
    ports:
      - "3000:3000"
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uav-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgis_data:
  redis_data:
